# Generated by `minimal init`

[upstream] # Source of software & tooling
repo = "https://github.com/gominimal/pkgs"
branch = "main"
locked_commit = "7cb755b661ef8e20cb41e661beaa9fbfc0594668"

[harness]
use = "pnpm"
runtime_packages = ["agent-browser"]

[defaults]
state_key = "dev"

[tasks.shell]
packages = ["base"]
exec = "bash -l"

[tasks.browser-snapshot]
packages = ["base", "gcc", "binutils"]
bash = """
set -e

# Fix 1: Copy agent-browser and install missing jszip
if [ ! -d /state/agent-browser ]; then
  cp -a /usr/libexec/agent-browser /state/agent-browser
  cd /state/agent-browser
  npm install --legacy-peer-deps jszip 2>&1
fi

# Fix 2: Build stub libs for missing chromium system dependencies
STUB_DIR=/state/stub-libs
if [ ! -f "$STUB_DIR/libudev.so.1" ]; then
  mkdir -p "$STUB_DIR"
  # libudev stub with versioned symbols
  gcc -shared -o "$STUB_DIR/libudev.so.1" stub-udev.c \
    -Wl,-soname,libudev.so.1 -Wl,--version-script=stub-udev.ver
  # atk-bridge stub (only needs atk_bridge_adaptor_init)
  echo 'int atk_bridge_adaptor_init(int *argc, char **argv[]) { return 0; }' > /tmp/stub-atk.c
  gcc -shared -o "$STUB_DIR/libatk-bridge-2.0.so.0" /tmp/stub-atk.c \
    -Wl,-soname,libatk-bridge-2.0.so.0
  rm /tmp/stub-atk.c
fi

export LD_LIBRARY_PATH="$STUB_DIR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
export AGENT_BROWSER_HOME=/state/agent-browser
export XDG_RUNTIME_DIR=/tmp
export PLAYWRIGHT_BROWSERS_PATH=/usr/share/agent-browser/browsers
export PATH="/state/agent-browser/bin:$PATH"

echo "Environment ready. agent-browser is on PATH."
echo "Example: agent-browser-linux-x64 snapshot example.com"
exec bash -l
"""
